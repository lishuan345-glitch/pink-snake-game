<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粉红贪吃蛇 - 可爱小游戏</title>
  <style>
    /* ==================== 全局样式 ==================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial Rounded MT Bold', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #FFE4E9 0%, #FFDEE9 50%, #FFE4F3 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ==================== 容器样式 ==================== */
    .game-container {
      background: linear-gradient(145deg, #FFF5F7 0%, #FFE8EE 100%);
      border-radius: 30px;
      padding: 40px;
      box-shadow:
        0 20px 60px rgba(255, 105, 180, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.8) inset;
      text-align: center;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    /* ==================== 标题样式 ==================== */
    .game-title {
      font-size: 48px;
      color: #FF1493;
      margin-bottom: 20px;
      text-shadow:
        3px 3px 0px #FFB6C1,
        6px 6px 10px rgba(255, 105, 180, 0.3);
      letter-spacing: 3px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    .game-title::before {
      content: "✨ ";
    }

    .game-title::after {
      content: " ✨";
    }

    /* ==================== 分数板样式 ==================== */
    .score-board {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 20px;
    }

    .score-item {
      background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
      color: white;
      padding: 15px 30px;
      border-radius: 20px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
      flex: 1;
      transition: transform 0.3s ease;
    }

    .score-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 20, 147, 0.6);
    }

    .score-value {
      font-size: 28px;
      display: block;
      margin-top: 5px;
    }

    /* ==================== 画布样式 ==================== */
    .canvas-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    #gameCanvas {
      background: linear-gradient(135deg, #FFFFFF 0%, #FFF0F5 100%);
      border-radius: 20px;
      box-shadow:
        0 10px 30px rgba(255, 105, 180, 0.3),
        0 0 0 3px #FFB6C1,
        0 0 0 6px #FF69B4;
      display: block;
    }

    /* ==================== 控制按钮样式 ==================== */
    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      background: linear-gradient(135deg, #FF69B4 0%, #FF1493 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 25px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 20, 147, 0.6);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:active::before {
      width: 300px;
      height: 300px;
    }

    /* ==================== 音乐控制样式 ==================== */
    .music-control {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%);
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
      font-size: 24px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .music-control:hover {
      transform: rotate(15deg) scale(1.1);
    }

    /* ==================== 游戏结束提示 ==================== */
    .game-over-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 105, 180, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .game-over-content {
      background: linear-gradient(145deg, #FFF5F7 0%, #FFE8EE 100%);
      padding: 60px;
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: scaleIn 0.5s ease;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .game-over-title {
      font-size: 48px;
      color: #FF1493;
      margin-bottom: 20px;
      text-shadow: 3px 3px 0px #FFB6C1;
    }

    .game-over-score {
      font-size: 32px;
      color: #FF69B4;
      margin-bottom: 30px;
    }

    /* ==================== 方向键提示 ==================== */
    .key-hint {
      color: #FF69B4;
      font-size: 14px;
      margin-top: 10px;
      opacity: 0.8;
    }

    /* ==================== 欢迎界面样式 ==================== */
    .welcome-screen {
      background: linear-gradient(145deg, #FFF5F7 0%, #FFE8EE 100%);
      border-radius: 30px;
      padding: 60px 40px;
      box-shadow:
        0 20px 60px rgba(255, 105, 180, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.8) inset;
      text-align: center;
      animation: float 3s ease-in-out infinite;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .welcome-content {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .welcome-text {
      font-size: 24px;
      color: #FF69B4;
      font-weight: bold;
    }

    .welcome-instructions {
      background: linear-gradient(135deg, #FFE4E9 0%, #FFF0F5 100%);
      padding: 30px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 5px 15px rgba(255, 105, 180, 0.2);
    }

    .welcome-instructions p {
      font-size: 18px;
      color: #FF1493;
      margin: 0;
      font-weight: 500;
    }

    .btn-large {
      padding: 20px 50px;
      font-size: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    /* ==================== 响应式设计 ==================== */
    @media (max-width: 768px) {
      .game-container, .welcome-screen {
        padding: 20px;
        border-radius: 20px;
      }

      .game-title {
        font-size: 32px;
      }

      #gameCanvas {
        max-width: 100%;
        height: auto;
      }

      .score-board {
        flex-direction: column;
      }

      .btn {
        padding: 12px 24px;
        font-size: 16px;
      }

      .btn-large {
        padding: 15px 35px;
        font-size: 20px;
      }

      .welcome-instructions p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- 欢迎界面 -->
  <div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-content">
      <h1 class="game-title">粉红贪吃蛇</h1>
      <p class="welcome-text">一个可爱的粉红色小游戏 💕</p>
      <div class="welcome-instructions">
        <p>🎮 使用方向键控制蛇的移动</p>
        <p>🍎 吃到食物得分并变长</p>
        <p>⚡ 分数越高速度越快</p>
        <p>💥 不要撞墙或撞到自己</p>
      </div>
      <button class="btn btn-large" id="startGameBtn">开始游戏 🎮</button>
    </div>
  </div>

  <!-- 游戏主界面 -->
  <div class="game-container" id="gameContainer" style="display: none;">
    <button class="music-control" id="musicToggle" title="音乐开关">🎵</button>

    <h1 class="game-title">粉红贪吃蛇</h1>

    <div class="score-board">
      <div class="score-item">
        <span>当前分数</span>
        <span class="score-value" id="currentScore">0</span>
      </div>
      <div class="score-item">
        <span>最高分数</span>
        <span class="score-value" id="highScore">0</span>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>

    <div class="controls">
      <button class="btn" id="pauseBtn">暂停</button>
      <button class="btn" id="restartBtn">重新开始</button>
      <button class="btn" id="backBtn">返回菜单</button>
    </div>

    <div class="key-hint">
      使用方向键 ↑ ↓ ← → 控制蛇的移动 | 空格键暂停
    </div>
  </div>

  <div class="game-over-overlay" id="gameOverOverlay">
    <div class="game-over-content">
      <div class="game-over-title">游戏结束！💕</div>
      <div class="game-over-score">
        你的分数：<span id="finalScore">0</span>
      </div>
      <button class="btn" id="retryBtn">再来一次</button>
    </div>
  </div>

  <script>
    /* ==================== 游戏常量定义 ==================== */
    const CANVAS_WIDTH = 600;
    const CANVAS_HEIGHT = 600;
    const CELL_SIZE = 20;
    const GRID_WIDTH = CANVAS_WIDTH / CELL_SIZE;
    const GRID_HEIGHT = CANVAS_HEIGHT / CELL_SIZE;
    const INITIAL_SPEED = 150;
    const INITIAL_LENGTH = 3;

    /* ==================== 游戏状态变量 ==================== */
    let canvas;
    let ctx;
    let snake = [];
    let food = { x: 0, y: 0 };
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let score = 0;
    let highScore = 0;
    let gameLoop = null;
    let isGameRunning = false;
    let isPaused = false;
    let speed = INITIAL_SPEED;

    /* ==================== 音频相关变量 ==================== */
    let audioContext;
    let musicSource;
    let gainNode;
    let isMusicPlaying = false;

    /* ==================== 初始化函数 ==================== */
    /**
     * 页面加载完成后初始化游戏
     */
    window.addEventListener('DOMContentLoaded', () => {
      initGame();
      initAudio();
      loadHighScore();
      setupEventListeners();
    });

    /**
     * 初始化游戏画布和基本设置
     */
    function initGame() {
      canvas = document.getElementById('gameCanvas');
      ctx = canvas.getContext('2d');

      // 初始化蛇的位置
      resetSnake();

      // 生成初始食物
      generateFood();

      // 绘制初始游戏画面
      drawGame();
    }

    /**
     * 重置蛇的初始状态
     */
    function resetSnake() {
      snake = [];
      const startX = Math.floor(GRID_WIDTH / 2);
      const startY = Math.floor(GRID_HEIGHT / 2);

      for (let i = 0; i < INITIAL_LENGTH; i++) {
        snake.push({ x: startX - i, y: startY });
      }

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
    }

    /* ==================== 音频初始化和控制 ==================== */
    /**
     * 初始化Web Audio API
     */
    function initAudio() {
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioContext.createGain();
        gainNode.gain.value = 0.3; // 设置音量为30%
        gainNode.connect(audioContext.destination);
      } catch (e) {
        console.error('Web Audio API 不支持', e);
      }
    }

    /**
     * 播放背景音乐（使用Web Audio API生成简单的旋律）
     */
    function playBackgroundMusic() {
      if (!audioContext || isMusicPlaying) return;

      isMusicPlaying = true;
      document.getElementById('musicToggle').textContent = '🎵';

      // 播放循环音乐
      playMelody();
    }

    /**
     * 播放可爱的电子音乐旋律
     */
    function playMelody() {
      if (!isMusicPlaying || !audioContext) return;

      // 定义一个简单的旋律（使用MIDI音符编号）
      const melody = [
        { note: 72, duration: 0.3 }, // C5
        { note: 76, duration: 0.3 }, // E5
        { note: 79, duration: 0.3 }, // G5
        { note: 76, duration: 0.3 }, // E5
        { note: 72, duration: 0.3 }, // C5
        { note: 74, duration: 0.3 }, // D5
        { note: 76, duration: 0.6 }, // E5
      ];

      let currentTime = audioContext.currentTime;

      melody.forEach((item, index) => {
        const oscillator = audioContext.createOscillator();
        const noteGain = audioContext.createGain();

        oscillator.type = 'sine'; // 使用正弦波产生柔和的音色
        oscillator.frequency.value = midiToFreq(item.note);

        // 音符包络
        noteGain.gain.setValueAtTime(0, currentTime);
        noteGain.gain.linearRampToValueAtTime(0.3, currentTime + 0.01);
        noteGain.gain.linearRampToValueAtTime(0, currentTime + item.duration);

        oscillator.connect(noteGain);
        noteGain.connect(gainNode);

        oscillator.start(currentTime);
        oscillator.stop(currentTime + item.duration);

        currentTime += item.duration;
      });

      // 循环播放
      setTimeout(() => {
        if (isMusicPlaying) {
          playMelody();
        }
      }, currentTime * 1000 - audioContext.currentTime * 1000 + 500);
    }

    /**
     * 将MIDI音符编号转换为频率
     * @param {number} midi - MIDI音符编号
     * @returns {number} 频率值
     */
    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    /**
     * 停止背景音乐
     */
    function stopBackgroundMusic() {
      isMusicPlaying = false;
      document.getElementById('musicToggle').textContent = '🔇';
    }

    /**
     * 切换音乐播放状态
     */
    function toggleMusic() {
      if (isMusicPlaying) {
        stopBackgroundMusic();
      } else {
        playBackgroundMusic();
      }
    }

    /* ==================== 游戏逻辑函数 ==================== */
    /**
     * 显示游戏界面（从欢迎界面进入）
     */
    function showGameScreen() {
      document.getElementById('welcomeScreen').style.display = 'none';
      document.getElementById('gameContainer').style.display = 'block';

      // 自动开始游戏
      startGame();
    }

    /**
     * 返回欢迎界面
     */
    function showWelcomeScreen() {
      // 停止游戏
      if (gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
      }
      isGameRunning = false;
      isPaused = false;

      // 停止音乐
      stopBackgroundMusic();

      // 重置游戏
      resetGame();

      // 显示欢迎界面
      document.getElementById('gameContainer').style.display = 'none';
      document.getElementById('welcomeScreen').style.display = 'flex';
      document.getElementById('gameOverOverlay').style.display = 'none';
    }

    /**
     * 开始游戏
     */
    function startGame() {
      if (isGameRunning && !isPaused) return;

      if (!isGameRunning) {
        resetGame();
      }

      isGameRunning = true;
      isPaused = false;

      // 启动音乐
      if (!isMusicPlaying) {
        playBackgroundMusic();
      }

      // 启动游戏循环
      if (!gameLoop) {
        gameLoop = setInterval(updateGame, speed);
      }

      document.getElementById('pauseBtn').textContent = '暂停';
    }

    /**
     * 暂停/继续游戏
     */
    function pauseGame() {
      if (!isGameRunning) return;

      isPaused = !isPaused;

      if (isPaused) {
        clearInterval(gameLoop);
        gameLoop = null;
        document.getElementById('pauseBtn').textContent = '继续';
      } else {
        gameLoop = setInterval(updateGame, speed);
        document.getElementById('pauseBtn').textContent = '暂停';
      }
    }

    /**
     * 重置游戏状态
     */
    function resetGame() {
      // 重置分数
      score = 0;
      updateScore();

      // 重置速度
      speed = INITIAL_SPEED;

      // 重置蛇
      resetSnake();

      // 生成新食物
      generateFood();

      // 清除游戏循环
      if (gameLoop) {
        clearInterval(gameLoop);
        gameLoop = null;
      }

      // 重置游戏状态
      isGameRunning = false;
      isPaused = false;

      // 隐藏游戏结束界面
      document.getElementById('gameOverOverlay').style.display = 'none';

      // 绘制初始画面
      drawGame();
    }

    /**
     * 游戏主循环更新函数
     */
    function updateGame() {
      // 更新方向
      direction = { ...nextDirection };

      // 计算蛇头的新位置
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      // 检测碰撞
      if (checkCollision(head)) {
        gameOver();
        return;
      }

      // 添加新蛇头
      snake.unshift(head);

      // 检查是否吃到食物
      if (head.x === food.x && head.y === food.y) {
        // 增加分数
        score += 10;
        updateScore();

        // 播放吃到食物的音效
        playEatSound();

        // 生成新食物
        generateFood();

        // 增加速度
        if (score % 50 === 0 && speed > 50) {
          speed -= 10;
          clearInterval(gameLoop);
          gameLoop = setInterval(updateGame, speed);
        }
      } else {
        // 移除蛇尾
        snake.pop();
      }

      // 重绘游戏画面
      drawGame();
    }

    /**
     * 检测碰撞
     * @param {Object} head - 蛇头位置
     * @returns {boolean} 是否发生碰撞
     */
    function checkCollision(head) {
      // 检测墙壁碰撞
      if (head.x < 0 || head.x >= GRID_WIDTH || head.y < 0 || head.y >= GRID_HEIGHT) {
        return true;
      }

      // 检测自身碰撞
      for (let i = 0; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          return true;
        }
      }

      return false;
    }

    /**
     * 游戏结束
     */
    function gameOver() {
      // 停止游戏
      clearInterval(gameLoop);
      gameLoop = null;
      isGameRunning = false;

      // 更新最高分
      if (score > highScore) {
        highScore = score;
        saveHighScore();
        updateHighScore();
      }

      // 显示游戏结束界面
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverOverlay').style.display = 'flex';

      // 播放游戏结束音效
      playGameOverSound();
    }

    /* ==================== 食物生成函数 ==================== */
    /**
     * 生成随机位置的食物
     */
    function generateFood() {
      let newFood;
      let isValidPosition = false;

      while (!isValidPosition) {
        newFood = {
          x: Math.floor(Math.random() * GRID_WIDTH),
          y: Math.floor(Math.random() * GRID_HEIGHT)
        };

        // 确保食物不在蛇身上
        isValidPosition = !snake.some(segment =>
          segment.x === newFood.x && segment.y === newFood.y
        );
      }

      food = newFood;
    }

    /* ==================== 绘制函数 ==================== */
    /**
     * 绘制整个游戏画面
     */
    function drawGame() {
      // 清空画布
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      // 绘制网格（可选）
      drawGrid();

      // 绘制食物
      drawFood();

      // 绘制蛇
      drawSnake();
    }

    /**
     * 绘制网格线
     */
    function drawGrid() {
      ctx.strokeStyle = '#FFE4E9';
      ctx.lineWidth = 0.5;

      // 绘制垂直线
      for (let x = 0; x <= CANVAS_WIDTH; x += CELL_SIZE) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, CANVAS_HEIGHT);
        ctx.stroke();
      }

      // 绘制水平线
      for (let y = 0; y <= CANVAS_HEIGHT; y += CELL_SIZE) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(CANVAS_WIDTH, y);
        ctx.stroke();
      }
    }

    /**
     * 绘制蛇
     */
    function drawSnake() {
      snake.forEach((segment, index) => {
        if (index === 0) {
          // 蛇头
          ctx.fillStyle = '#FF69B4';
          ctx.shadowColor = '#FF1493';
          ctx.shadowBlur = 10;
        } else {
          // 蛇身
          ctx.fillStyle = '#FFB6C1';
          ctx.shadowBlur = 5;
        }

        // 绘制圆角矩形
        drawRoundedRect(
          segment.x * CELL_SIZE + 1,
          segment.y * CELL_SIZE + 1,
          CELL_SIZE - 2,
          CELL_SIZE - 2,
          5
        );

        ctx.shadowBlur = 0;
      });

      // 绘制蛇眼睛
      if (snake.length > 0) {
        const head = snake[0];
        ctx.fillStyle = 'white';

        // 根据方向绘制眼睛
        if (direction.x === 1) { // 向右
          ctx.beginPath();
          ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.7, head.y * CELL_SIZE + CELL_SIZE * 0.35, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.7, head.y * CELL_SIZE + CELL_SIZE * 0.65, 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (direction.x === -1) { // 向左
          ctx.beginPath();
          ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.3, head.y * CELL_SIZE + CELL_SIZE * 0.35, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.3, head.y * CELL_SIZE + CELL_SIZE * 0.65, 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (direction.y === -1) { // 向上
          ctx.beginPath();
          ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.35, head.y * CELL_SIZE + CELL_SIZE * 0.3, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.65, head.y * CELL_SIZE + CELL_SIZE * 0.3, 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (direction.y === 1) { // 向下
          ctx.beginPath();
          ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.35, head.y * CELL_SIZE + CELL_SIZE * 0.7, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.65, head.y * CELL_SIZE + CELL_SIZE * 0.7, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    /**
     * 绘制食物
     */
    function drawFood() {
      // 绘制食物光晕
      const gradient = ctx.createRadialGradient(
        food.x * CELL_SIZE + CELL_SIZE / 2,
        food.y * CELL_SIZE + CELL_SIZE / 2,
        0,
        food.x * CELL_SIZE + CELL_SIZE / 2,
        food.y * CELL_SIZE + CELL_SIZE / 2,
        CELL_SIZE
      );
      gradient.addColorStop(0, '#FF1493');
      gradient.addColorStop(0.5, '#FF69B4');
      gradient.addColorStop(1, 'transparent');

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(
        food.x * CELL_SIZE + CELL_SIZE / 2,
        food.y * CELL_SIZE + CELL_SIZE / 2,
        CELL_SIZE,
        0,
        Math.PI * 2
      );
      ctx.fill();

      // 绘制食物实体
      ctx.fillStyle = '#FF1493';
      ctx.shadowColor = '#FF1493';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(
        food.x * CELL_SIZE + CELL_SIZE / 2,
        food.y * CELL_SIZE + CELL_SIZE / 2,
        CELL_SIZE / 3,
        0,
        Math.PI * 2
      );
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    /**
     * 绘制圆角矩形
     * @param {number} x - x坐标
     * @param {number} y - y坐标
     * @param {number} width - 宽度
     * @param {number} height - 高度
     * @param {number} radius - 圆角半径
     */
    function drawRoundedRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();
    }

    /* ==================== 音效函数 ==================== */
    /**
     * 播放吃到食物的音效
     */
    function playEatSound() {
      if (!audioContext) return;

      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);

      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.1);
    }

    /**
     * 播放游戏结束音效
     */
    function playGameOverSound() {
      if (!audioContext) return;

      const times = [0, 0.15, 0.3];
      const freqs = [400, 300, 200];

      times.forEach((time, index) => {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.value = freqs[index];

        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime + time);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + time + 0.2);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start(audioContext.currentTime + time);
        oscillator.stop(audioContext.currentTime + time + 0.2);
      });
    }

    /* ==================== 分数管理函数 ==================== */
    /**
     * 更新当前分数显示
     */
    function updateScore() {
      document.getElementById('currentScore').textContent = score;
    }

    /**
     * 更新最高分数显示
     */
    function updateHighScore() {
      document.getElementById('highScore').textContent = highScore;
    }

    /**
     * 保存最高分到本地存储
     */
    function saveHighScore() {
      localStorage.setItem('snakeHighScore', highScore);
    }

    /**
     * 从本地存储加载最高分
     */
    function loadHighScore() {
      const saved = localStorage.getItem('snakeHighScore');
      if (saved) {
        highScore = parseInt(saved);
        updateHighScore();
      }
    }

    /* ==================== 事件监听设置 ==================== */
    /**
     * 设置所有事件监听器
     */
    function setupEventListeners() {
      // 键盘控制
      document.addEventListener('keydown', handleKeyPress);

      // 欢迎界面按钮
      document.getElementById('startGameBtn').addEventListener('click', showGameScreen);

      // 游戏控制按钮
      document.getElementById('pauseBtn').addEventListener('click', pauseGame);
      document.getElementById('restartBtn').addEventListener('click', () => {
        resetGame();
        startGame();
      });
      document.getElementById('backBtn').addEventListener('click', showWelcomeScreen);

      // 游戏结束界面按钮
      document.getElementById('retryBtn').addEventListener('click', () => {
        document.getElementById('gameOverOverlay').style.display = 'none';
        resetGame();
        startGame();
      });

      // 音乐控制
      document.getElementById('musicToggle').addEventListener('click', toggleMusic);
    }

    /**
     * 处理键盘按键
     * @param {KeyboardEvent} event - 键盘事件
     */
    function handleKeyPress(event) {
      // 防止方向键滚动页面
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
        event.preventDefault();
      }

      switch (event.key) {
        case 'ArrowUp':
          if (direction.y === 0) { // 不能反向
            nextDirection = { x: 0, y: -1 };
          }
          break;
        case 'ArrowDown':
          if (direction.y === 0) {
            nextDirection = { x: 0, y: 1 };
          }
          break;
        case 'ArrowLeft':
          if (direction.x === 0) {
            nextDirection = { x: -1, y: 0 };
          }
          break;
        case 'ArrowRight':
          if (direction.x === 0) {
            nextDirection = { x: 1, y: 0 };
          }
          break;
        case ' ':
          // 空格键暂停/继续
          if (isGameRunning) {
            pauseGame();
          }
          break;
      }
    }
  </script>
